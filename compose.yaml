x-sandbox-labels: &sandbox-labels
  io.github.ai-agent-sandbox.managed: "true"
  io.github.ai-agent-sandbox.mode: "compose"

x-sandbox-base: &sandbox-base
  build:
    context: .
    dockerfile: Containerfile
  image: ai-agent-sandbox:latest
  working_dir: /workspace
  user: "${SANDBOX_UID:-1000}:${SANDBOX_GID:-1000}"
  read_only: true
  stdin_open: true
  tty: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  pids_limit: 512
  tmpfs:
    - /tmp:rw,nosuid,nodev,noexec,size=1073741824
    - /var/tmp:rw,nosuid,nodev,noexec,size=268435456
  volumes:
    - .:/workspace:rw
    - ./.sandbox/home:/home/agent:rw
  environment:
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    HTTP_PROXY: ${HTTP_PROXY:-}
    HTTPS_PROXY: ${HTTPS_PROXY:-}
    NO_PROXY: ${NO_PROXY:-}
  labels:
    <<: *sandbox-labels

services:
  sandbox:
    <<: *sandbox-base
    network_mode: none
    labels:
      <<: *sandbox-labels
      io.github.ai-agent-sandbox.service: "sandbox"
      io.github.ai-agent-sandbox.network: "offline"

  sandbox-online:
    <<: *sandbox-base
    labels:
      <<: *sandbox-labels
      io.github.ai-agent-sandbox.service: "sandbox-online"
      io.github.ai-agent-sandbox.network: "online"
